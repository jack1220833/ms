<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数据库连接测试</title>
<style>
body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px;background:#f5f5f5}
h1{color:#333;font-size:24px}
.log{background:#fff;border:1px solid #ddd;border-radius:8px;padding:16px;margin:12px 0;min-height:200px;white-space:pre-wrap;font-size:14px;line-height:1.6}
.btn{background:#4CAF50;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;margin:6px}
.btn:active{opacity:0.8}
.btn-blue{background:#2196F3}
.btn-orange{background:#FF9800}
.success{color:#4CAF50;font-weight:bold}
.error{color:#f44336;font-weight:bold}
</style>
</head>
<body>
<h1>🗄️ 数据库连接测试</h1>
<div>
  <button class="btn" onclick="testConnection()">1. 测试连接</button>
  <button class="btn btn-blue" onclick="insertTestPlayer()">2. 插入测试玩家</button>
  <button class="btn btn-orange" onclick="readPlayers()">3. 读取玩家列表</button>
</div>
<div class="log" id="log">点击按钮开始测试...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iigckwcdwclmekyxsvbj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AWxSEp2mc9X5FXD9y7sFjA_9GY19yrJ';

const logEl = document.getElementById('log');
function addLog(msg, type) {
  const cls = type === 'success' ? 'success' : type === 'error' ? 'error' : '';
  logEl.innerHTML += '<span class="'+cls+'">' + msg + '</span>\n';
}

let db;
try {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  addLog('✅ Supabase客户端创建成功', 'success');
} catch(e) {
  addLog('❌ 客户端创建失败: ' + e.message, 'error');
}

async function testConnection() {
  logEl.innerHTML = '';
  addLog('正在连接数据库...');
  try {
    const { data, error } = await db.from('players').select('*').limit(1);
    if (error) throw error;
    addLog('✅ 连接成功！players表可访问', 'success');
    addLog('当前玩家数: ' + (data ? data.length : 0));
  } catch(e) {
    addLog('❌ 连接失败: ' + e.message, 'error');
  }
}

async function insertTestPlayer() {
  logEl.innerHTML = '';
  addLog('正在插入测试玩家...');
  try {
    const { data, error } = await db.from('players').insert([
      { username: '测试玩家' + Math.floor(Math.random()*1000), grade: 4 }
    ]).select();
    if (error) throw error;
    addLog('✅ 插入成功！', 'success');
    addLog('返回数据: ' + JSON.stringify(data, null, 2));
  } catch(e) {
    addLog('❌ 插入失败: ' + e.message, 'error');
  }
}

async function readPlayers() {
  logEl.innerHTML = '';
  addLog('正在读取玩家列表...');
  try {
    const { data, error } = await db.from('players').select('*').order('created_at', { ascending: false }).limit(20);
    if (error) throw error;
    addLog('✅ 读取成功！共 ' + data.length + ' 个玩家', 'success');
    data.forEach(function(p) {
      addLog('  ' + p.username + ' | 年级' + (p.grade||'?') + ' | 注册于 ' + new Date(p.created_at).toLocaleString('zh-CN'));
    });
  } catch(e) {
    addLog('❌ 读取失败: ' + e.message, 'error');
  }
}
</script>
</body>
</html>
