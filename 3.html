// ========== 出题引擎 ==========
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

function genQ(tpl){
  var vars={},used={};
  var verbLoc=null;
  var hasRoom=tpl.v&&tpl.v.some(function(v){return v.replace(/\d+$/,'')==='room'});
  var hasLoc=tpl.v&&tpl.v.some(function(v){return['place_in','place_at','place_on','room'].indexOf(v.replace(/\d+$/,''))>=0});
  for(var k=0;k<(tpl.v||[]).length;k++){
    var vn=tpl.v[k];
    if(vn==='verb'){
      var pool=hasRoom?VB.filter(function(v){return v.loc!=='outdoor'}):VB;
      var vp=pick(pool);
      vars.vbase=vp.b;vars.ving=vp.i;vars.vs=vp.s;vars.vpast=vp.p;
      verbLoc=vp.loc||null;
    }else if(vn==='vstate'){
      var vp2=pick(VB_STATE);
      vars.vs=vp2.s;vars.vbase=vp2.b;vars.ving=vp2.i;vars.vpast=vp2.p;
    }
  }
  for(var k2=0;k2<(tpl.v||[]).length;k2++){
    var vn2=tpl.v[k2];
    if(vn2==='verb'||vn2==='vstate')continue;
    var base=vn2.replace(/\d+$/,'');
    var list=W[base];
    if(hasLoc&&verbLoc&&VLOC[verbLoc]&&VLOC[verbLoc][base]&&VLOC[verbLoc][base].length>0)list=VLOC[verbLoc][base];
    if(!list||!list.length)continue;
    if(!used[base])used[base]=[];
    var val,tt=0;
    do{val=pick(list);tt++}while(used[base].indexOf(val)>=0&&tt<20&&list.length>used[base].length);
    vars[vn2]=val;used[base].push(val);
  }
  function fill(s){for(var key in vars)s=s.replace(new RegExp('\\{'+key+'\\}','g'),vars[key]);return s}
  var correct=fill(tpl.t);
  var distractors=tpl.e?tpl.e.map(fill):tpl.d.slice();
  return{cat:tpl.cat,correct:correct,d:distractors};
}

function genRound(count){
  var pool=TL3.slice();shuffle(pool);
  var result=[],usedC={};
  for(var r=0;r<3&&result.length<count;r++){
    for(var i=0;i<pool.length&&result.length<count;i++){
      var q=genQ(pool[i]);
      if(!usedC[q.correct]){usedC[q.correct]=1;result.push(q)}
    }
  }
  return result;
}

// ========== 语音 ==========
function getBestVoice(){
  var vcs=speechSynthesis.getVoices();var best=null,bp=-1;
  for(var i=0;i<vcs.length;i++){
    var n=vcs[i].name.toLowerCase();var p=0;
    if(n.indexOf('google')>=0&&(n.indexOf('en-us')>=0||n.indexOf('english')>=0))p=10;
    else if(n.indexOf('microsoft')>=0&&(n.indexOf('en-us')>=0||n.indexOf('english')>=0)&&n.indexOf('online')>=0)p=9;
    else if(n.indexOf('en-us')>=0||n.indexOf('english us')>=0||n.indexOf('english (united states)')>=0)p=7;
    else if(n.indexOf('english')>=0||n.indexOf('en-')>=0)p=5;
    else if(vcs[i].lang&&vcs[i].lang.indexOf('en')===0)p=3;
    if(p>bp){bp=p;best=vcs[i]}
  }
  return best;
}

var kaTimer=null;
function startKa(){stopKa();kaTimer=setInterval(function(){if(speechSynthesis.speaking){speechSynthesis.pause();setTimeout(function(){speechSynthesis.resume()},50)}},5000)}
function stopKa(){if(kaTimer){clearInterval(kaTimer);kaTimer=null}}

function speak(text,cb){
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=RATE;u.pitch=1;
  var vc=getBestVoice();if(vc)u.voice=vc;
  u.onend=function(){stopKa();if(cb)cb()};
  u.onerror=function(){stopKa();if(cb)cb()};
  speechSynthesis.speak(u);startKa();
}

function speakLater(text,cb){
  speechSynthesis.cancel();
  setTimeout(function(){speak(text,cb)},80);
}

function playOk(){
  try{var c=new(window.AudioContext||window.webkitAudioContext)();[523.25,659.25,783.99].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.3,c.currentTime+i*.15);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.15+.3);o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.15);o.stop(c.currentTime+i*.15+.3)})}catch(e){}
}
function playNo(){
  try{var c=new(window.AudioContext||window.webkitAudioContext)();var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=220;g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.4);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.4)}catch(e){}
}

// ========== 页面切换 ==========
var pages=['pgHome','pgPlay','pgOpt','pgWrong','pgFinal'];
function showPg(id){for(var i=0;i<pages.length;i++)document.getElementById(pages[i]).className='hide';document.getElementById(id).className=''}

function updScore(){
  var ids1=['sc1','sc2','sc3'],ids2=['sa1','sa2','sa3'];
  for(var i=0;i<3;i++){
    var e1=document.getElementById(ids1[i]);if(e1)e1.textContent=okCnt;
    var e2=document.getElementById(ids2[i]);if(e2)e2.textContent=ansCnt;
  }
}

// ========== 游戏流程 ==========
function doStart(){
  qs=genRound(TOTAL);
  idx=0;okCnt=0;ansCnt=0;
  doPlay();
}

function doPlay(){
  if(idx>=qs.length){doFinal();return}
  curQ=qs[idx];firstOk=true;
  showPg('pgPlay');
  document.getElementById('prog1').textContent='第 '+(idx+1)+' / '+qs.length+' 题';
  document.getElementById('tag1').textContent=curQ.cat;
  document.getElementById('playSt').textContent='🔊 正在播放录音...';
  document.getElementById('playHint').textContent='请仔细听，录音将播放两遍';
  document.getElementById('btnReplay').className='replay-btn';
  document.getElementById('btnNext').className='next-btn hide';
  updScore();
  speak(curQ.correct,function(){
    document.getElementById('playSt').textContent='🔊 第二遍播放中...';
    document.getElementById('playHint').textContent='';
    setTimeout(function(){speakLater(curQ.correct,function(){
      document.getElementById('playSt').textContent='✅ 录音播放完毕';
      document.getElementById('playHint').textContent='准备好了吗？';
      document.getElementById('btnNext').className='next-btn';
    })},2000);
  });
}

function doReplay(){
  speechSynthesis.cancel();stopKa();
  document.getElementById('playSt').textContent='🔊 再听一遍...';
  speak(curQ.correct,function(){
    document.getElementById('playSt').textContent='✅ 播放完毕';
    document.getElementById('btnNext').className='next-btn';
  });
}

var _optLock=false; // 防止touchend+click双触发
function handleOpt(t){
  if(_optLock)return;
  if(t.className.indexOf('opt')<0||t.className.indexOf('off')>=0)return;
  _optLock=true;
  var box=document.getElementById('optsBox');
  var allBtns=box.querySelectorAll('.opt');
  var txt=t.textContent;
  for(var j=0;j<allBtns.length;j++)allBtns[j].className='opt off';
  if(txt===curQ.correct){
    t.className='opt ok';
    ansCnt++;
    if(firstOk)okCnt++;
    updScore();playOk();
    setTimeout(function(){idx++;_optLock=false;doPlay()},1500);
  }else{
    t.className='opt no';
    firstOk=false;
    for(var j2=0;j2<allBtns.length;j2++){if(allBtns[j2].textContent===curQ.correct)allBtns[j2].className='opt ok'}
    playNo();
    showPg('pgWrong');
    document.getElementById('prog3').textContent='第 '+(idx+1)+' / '+qs.length+' 题';
    document.getElementById('ansCorrect').textContent=curQ.correct;
    updScore();
    setTimeout(function(){
      _optLock=false;
      showPg('pgPlay');
      document.getElementById('prog1').textContent='第 '+(idx+1)+' / '+qs.length+' 题';
      document.getElementById('tag1').textContent=curQ.cat;
      document.getElementById('playSt').textContent='🔊 重新播放...';
      document.getElementById('playHint').textContent='仔细听，再选一次';
      document.getElementById('btnReplay').className='replay-btn';
      document.getElementById('btnNext').className='next-btn hide';
      updScore();
      speak(curQ.correct,function(){
        document.getElementById('playSt').textContent='✅ 播放完毕';
        document.getElementById('playHint').textContent='';
        document.getElementById('btnNext').className='next-btn';
      });
    },2000);
  }
}

function doShowOpt(){
  showPg('pgOpt');
  document.getElementById('prog2').textContent='第 '+(idx+1)+' / '+qs.length+' 题';
  document.getElementById('tag2').textContent=curQ.cat;
  updScore();
  _optLock=false;
  var box=document.getElementById('optsBox');box.innerHTML='';
  var arr=[curQ.correct].concat(curQ.d);shuffle(arr);
  for(var i=0;i<arr.length;i++){
    var b=document.createElement('button');
    b.className='opt';b.textContent=arr[i];
    b.setAttribute('data-idx',i);
    box.appendChild(b);
  }
}

function doFinal(){
  showPg('pgFinal');
  var pct=ansCnt>0?Math.round(okCnt/ansCnt*100):0;
  var msg='';
  if(pct>=90)msg='天才啊！明天又来，我要打败你！';
  else if(pct>=80)msg='人才啊！明天又来，我要通知你们校长！';
  else if(pct>=70)msg='看不出来你还很厉害呢！明天又来！';
  else msg='其实你是天才，只是没有拿到"三苏高分秘籍"！明天又来，我传授你点高分秘诀！';
  document.getElementById('finalMsg').textContent=msg;
  document.getElementById('finalDetail').innerHTML='年级：三年级<br>正确：'+okCnt+' / '+ansCnt+'<br>正确率：'+pct+'%';
}

function goHome(){speechSynthesis.cancel();stopKa();showPg('pgHome')}

// ========== 绑定事件 ==========
bindTap(document.getElementById('btnStart'),doStart);
bindTap(document.getElementById('btnReplay'),doReplay);
bindTap(document.getElementById('btnNext'),doShowOpt);
bindTap(document.getElementById('btnHome1'),goHome);
bindTap(document.getElementById('btnHome2'),goHome);

// 选项区事件只绑定一次（避免答错重做时重复绑定导致多计数）
(function(){
  var box=document.getElementById('optsBox');
  box.addEventListener('touchend',function(ev){
    var t=ev.target;
    if(!t.className||t.className.indexOf('opt')<0||t.className.indexOf('off')>=0)return;
    ev.preventDefault();
    handleOpt(t);
  },{passive:false});
  box.addEventListener('click',function(ev){
    var t=ev.target;
    if(!t.className||t.className.indexOf('opt')<0||t.className.indexOf('off')>=0)return;
    handleOpt(t);
  });
})();
</script>
