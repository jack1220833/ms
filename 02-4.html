<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>归总问题 - 天才的思路</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#eef2ff 0%,#fdf2f8 50%,#fff7ed 100%);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:24px 0 40px 0;overflow-y:auto}
.container{width:90%;max-width:620px;text-align:center}
.badge{display:inline-block;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;padding:6px 24px;border-radius:30px;font-size:0.95em;font-weight:700;letter-spacing:0.15em;margin-bottom:28px;box-shadow:0 4px 15px rgba(124,58,237,0.3)}
.explain-box{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.06);border-radius:20px;padding:30px 20px;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.step-card{background:rgba(248,250,252,0.9);border:1px solid rgba(0,0,0,0.06);border-radius:16px;padding:20px;margin-bottom:16px;text-align:left;opacity:0;transform:translateY(20px);transition:opacity 0.5s ease,transform 0.5s ease}
.step-card.visible{opacity:1;transform:translateY(0)}
.step-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.step-number{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:0.85em;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{color:#2d3748;font-size:1.05em;font-weight:700}
.step-content{color:#4a5568;font-size:0.95em;line-height:1.7}
.step-content .highlight-gold{color:#d97706;font-weight:700}
.step-content .highlight-green{color:#059669;font-weight:700}
.step-content .highlight-blue{color:#2563eb;font-weight:700}
.step-content .highlight-purple{color:#7c3aed;font-weight:700}
.boxes-container{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin:16px 0}
.unit-box{width:56px;height:56px;background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(124,58,237,0.05));border:2px solid rgba(124,58,237,0.3);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;opacity:0;transform:scale(0.8);transition:opacity 0.3s ease,transform 0.3s ease}
.unit-box.visible{opacity:1;transform:scale(1)}
.unit-box.highlight{background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(124,58,237,0.1));border-color:#7c3aed;box-shadow:0 0 15px rgba(124,58,237,0.2)}
.unit-box .box-icon{font-size:1.4em}
.unit-box .box-value{font-size:0.75em;color:#4a5568}
.formula{background:rgba(5,150,105,0.1);border:1px solid rgba(5,150,105,0.2);border-radius:12px;padding:12px 16px;margin-top:14px;color:#059669;font-size:1.05em;font-weight:700}
.formula .result{color:#2d3748;font-size:1.2em}
.key-tip{background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.2);border-radius:12px;padding:14px 16px;margin-top:14px;color:#7c3aed;font-size:0.95em;line-height:1.6}
.expand-box{position:relative}
.expand-box .count-label{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:0.7em;color:#6b7280;white-space:nowrap}
.bottom-links{display:flex;justify-content:center;gap:14px;margin-top:8px;flex-wrap:wrap}
.link-btn{display:inline-block;color:#7c3aed;font-size:1em;font-weight:700;text-decoration:none;padding:12px 26px;border:2px solid rgba(124,58,237,0.3);border-radius:50px;background:rgba(124,58,237,0.06);transition:all 0.3s;letter-spacing:0.05em}
.link-btn:hover{background:rgba(124,58,237,0.12);border-color:#7c3aed;transform:translateY(-3px);box-shadow:0 6px 20px rgba(124,58,237,0.15)}
.footer{color:#1a1a1a;font-size:1.1em;font-weight:bold;margin-top:18px;padding:8px 0}
.scenario-title{font-size:1.1em;color:#4a5568;margin-bottom:20px;padding:12px 20px;background:rgba(248,250,252,0.8);border-radius:12px}
.stats-bar{background:rgba(255,255,255,0.9);border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:10px 18px;margin-bottom:20px;font-size:0.85em;color:#4a5568;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.stats-bar span{font-weight:700}.stats-bar .s-correct{color:#059669}.stats-bar .s-total{color:#2563eb}.stats-bar .s-rate{color:#d97706}
@media(max-width:480px){body{padding:16px 0 30px 0}.explain-box{padding:22px 14px}.badge{font-size:0.85em;padding:5px 18px;margin-bottom:20px}.step-card{padding:16px;margin-bottom:12px}.step-title{font-size:0.95em}.step-content{font-size:0.88em}.unit-box{width:48px;height:48px}.unit-box .box-icon{font-size:1.2em}.unit-box .box-value{font-size:0.65em}.scenario-title{font-size:1em;padding:10px 14px}.link-btn{font-size:0.9em;padding:10px 20px}}
</style>
</head>
<body>
<div class="container">
<div class="badge">天才的思路</div>
<div class="stats-bar" id="statsBar"></div>
<div class="explain-box">
<div class="scenario-title" id="scenarioTitle"></div>
<div class="step-card" id="step1">
<div class="step-header"><div class="step-number">1</div><div class="step-title">展示已知条件</div></div>
<div class="step-content">已知每份<span class="highlight-purple" id="showA"></span><span id="unitName1"></span>，共有<span class="highlight-blue" id="showB"></span>份</div>
<div class="boxes-container" id="totalBoxes"></div>
<div class="key-tip">总量还不知道，需要先算出来</div>
</div>
<div class="step-card" id="step2">
<div class="step-header"><div class="step-number">2</div><div class="step-title">先求总量</div></div>
<div class="step-content"><span class="highlight-purple">总量 = 每份 × 份数</span></div>
<div class="formula" id="formula2"></div>
</div>
<div class="step-card" id="step3">
<div class="step-header"><div class="step-number">3</div><div class="step-title">用总量求新份数</div></div>
<div class="step-content">现在每份变成了<span class="highlight-purple" id="showC"></span><span id="unitName3"></span><br><span class="highlight-gold">新份数 = 总量 ÷ 新的每份</span></div>
<div class="formula" id="formula3"></div>
</div>
<div class="step-card" id="step4">
<div class="step-header"><div class="step-number">4</div><div class="step-title">完整公式与答案</div></div>
<div class="step-content">综合两步，完整公式是：<br><span class="highlight-green">每份 × 份数 ÷ 新的每份</span></div>
<div class="formula" id="formula4"></div>
</div>
<div class="key-tip" style="margin-top:20px;text-align:center"><strong>归总问题的秘诀：</strong><br>先求<span class="highlight-purple">总量</span>是多少<br>再用<span class="highlight-purple">总量 ÷ 新的每份</span></div>
</div>
<div class="bottom-links">
<a class="link-btn" href="02.html?auto=1">再试一次</a>
<a class="link-btn" href="02-1.html">拜师学艺</a>
</div>
<div class="footer">清班数学组小同学们研制 制作：虹虹姐，刚子，Tony，雨香屁</div>
</div>
<script>
var A,B,C,total,ans,grade,scenario,correct=0,wrong=0;
try{
A=parseFloat(localStorage.getItem('unitGame2_A'));
B=parseFloat(localStorage.getItem('unitGame2_B'));
C=parseFloat(localStorage.getItem('unitGame2_C'));
total=parseFloat(localStorage.getItem('unitGame2_total'));
ans=parseFloat(localStorage.getItem('unitGame2_ans'));
grade=localStorage.getItem('unitGame_grade');
scenario=parseInt(localStorage.getItem('unitGame2_scenario'));
correct=parseInt(localStorage.getItem('unitGame_correct')||'0');
wrong=parseInt(localStorage.getItem('unitGame_wrong')||'0');
}catch(e){}
var total_count=correct+wrong;
var rate=total_count>0?Math.round(correct/total_count*100):0;
var sEl=document.getElementById('statsBar');
if(sEl){sEl.innerHTML='\u7d2f\u8ba1\u505a\u9898 <span class="s-total">'+total_count+'</span> \u9898 \u00b7 \u7b54\u5bf9 <span class="s-correct">'+correct+'</span> \u9898 \u00b7 \u6b63\u786e\u7387 <span class="s-rate">'+rate+'%</span>'}
if(!A||!B||!C||!total||!ans||isNaN(scenario)){window.location.href='02.html'}else{
var scenarioNames=['看书问题','走路问题','生产零件问题','写字问题'];
var unitNames=['页','米','个','个'];
var timeNames=['天','分钟','天','天'];
var _qt='';
try{_qt=localStorage.getItem('unitGame2_qtext')||''}catch(e){}
document.getElementById('scenarioTitle').innerHTML=(_qt?'<div style="color:#7c3aed;font-weight:700;margin-bottom:10px;font-size:0.95em">'+_qt+'</div>':'')+scenarioNames[scenario];
document.getElementById('unitName1').textContent=unitNames[scenario];
document.getElementById('unitName3').textContent=unitNames[scenario];
document.getElementById('showA').textContent=A;
document.getElementById('showB').textContent=B;
document.getElementById('showC').textContent=C;
// Show B boxes in step 1
var totalHtml='';var displayBoxes=Math.min(B,8);
for(var i=0;i<displayBoxes;i++){totalHtml+='<div class="unit-box" id="totalBox'+i+'"><span class="box-icon">📦</span><span class="box-value">'+A+'</span></div>'}
if(B>8){totalHtml+='<div class="unit-box" style="background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.1)"><span class="box-icon">...</span></div>'}
document.getElementById('totalBoxes').innerHTML=totalHtml;
document.getElementById('formula2').innerHTML=A+' × '+B+' = <span class="result">'+total+'</span>';
document.getElementById('formula3').innerHTML=total+' ÷ '+C+' = <span class="result">'+ans+'</span>';
document.getElementById('formula4').innerHTML=A+' × '+B+' ÷ '+C+' = '+total+' ÷ '+C+' = <span class="result">'+ans+'</span>';
function animateStep(stepId,delay){setTimeout(function(){var el=document.getElementById(stepId);if(el)el.classList.add('visible')},delay)}
function animateBoxes(containerId,count,delay,speed){for(var i=0;i<Math.min(count,8);i++){setTimeout(function(idx){var box=document.getElementById(containerId+idx);if(box){box.classList.add('visible')}},delay+i*speed,i)}}
animateStep('step1',300);
animateBoxes('totalBox',displayBoxes,600,80);
animateStep('step2',1800);
animateStep('step3',3200);
animateStep('step4',4200);
}
</script>
</body>
</html>
