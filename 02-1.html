<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>归总大挑战 - 数学游戏</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#eef2ff 0%,#fdf2f8 50%,#fff7ed 100%);min-height:100vh;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;overflow-y:auto;padding:24px 16px}
.container{width:100%;max-width:460px;text-align:center}
.game-tag{display:inline-block;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#2563eb;font-size:0.7em;padding:3px 12px;border-radius:20px;margin-bottom:12px}
.icon-area{font-size:3em;margin-bottom:10px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.title{color:#2d3748;font-size:1.8em;font-weight:900;margin-bottom:6px}
.subtitle{color:#7c3aed;font-size:0.95em;font-weight:700;margin-bottom:16px;letter-spacing:0.1em}
.stats-bar{background:rgba(255,255,255,0.9);border:1px solid rgba(0,0,0,0.08);border-radius:10px;padding:8px 16px;margin-bottom:16px;font-size:0.8em;color:#4a5568;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.stats-bar span{font-weight:700}
.stats-bar .s-correct{color:#059669}
.stats-bar .s-total{color:#2563eb}
.stats-bar .s-rate{color:#d97706}
.description-box{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.06);border-radius:16px;padding:20px 22px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.description{color:#4a5568;font-size:0.95em;line-height:1.7;margin-bottom:14px}
.formula-box{background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.2);border-radius:12px;padding:12px 18px;margin-top:10px}
.formula-title{color:#7c3aed;font-size:0.85em;font-weight:700;margin-bottom:8px}
.formula{color:#2d3748;font-size:1em;font-weight:700;line-height:1.7}
.formula .step{display:block;margin:4px 0;color:#4a5568;font-size:0.9em;font-weight:400}
.formula .step span{color:#7c3aed;font-weight:700}
.start-btn{display:inline-block;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:1.15em;font-weight:900;padding:14px 44px;border-radius:60px;text-decoration:none;box-shadow:0 4px 20px rgba(124,58,237,0.3);transition:all 0.3s;letter-spacing:0.1em}
.start-btn:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(124,58,237,0.4)}
.footer{color:#1a1a1a;font-size:1.1em;font-weight:bold;margin-top:20px;padding:4px 0}
@media(max-width:480px){.title{font-size:1.6em}.subtitle{font-size:0.85em}.icon-area{font-size:2.5em}.description-box{padding:16px 14px}.description{font-size:0.9em}.start-btn{font-size:1.05em;padding:12px 36px}}
</style>
</head>
<body>
<div class="container">
<div class="game-tag">第 2 关 · 母题</div>
<div class="icon-area">📊</div>
<h1 class="title">归总大挑战</h1>
<div class="subtitle">归总问题 · 先求总量再求新份数</div>
<div class="stats-bar" id="statsBar" style="display:none"></div>
<div class="description-box">
<div class="description">已知每份是 A，共 B 份<br>换了新的每份 C，求新份数是多少？</div>
<div class="formula-box">
<div class="formula-title">解题思路</div>
<div class="formula">
<span class="step">第一步：<span>总量 = A × B</span></span>
<span class="step">第二步：<span>新份数 = 总量 ÷ C</span></span>
<span class="step">完整公式：<span>A × B ÷ C</span></span>
</div>
</div>
</div>
<a class="start-btn" href="02.html">开始游戏</a>
<div class="footer">清班数学组小同学们研制 制作：虹虹姐，刚子，Tony，雨香屁</div>
</div>
<script>
try{
var correct=parseInt(localStorage.getItem('unitGame_correct')||'0');
var wrong=parseInt(localStorage.getItem('unitGame_wrong')||'0');
var total=correct+wrong;
var rate=total>0?Math.round(correct/total*100):0;
var el=document.getElementById('statsBar');
if(el&&total>0){
el.innerHTML='累计做题 <span class="s-total">'+total+'</span> 题 · 答对 <span class="s-correct">'+correct+'</span> 题 · 正确率 <span class="s-rate">'+rate+'%</span>';
el.style.display='block';
}
}catch(e){}
</script>
</body>
</html>
