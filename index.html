<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>四年级英语游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;width:100%}
body{height:100%;overflow:hidden;position:fixed;width:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
.wrap{min-height:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;padding:24px 20px 80px}
.title{font-size:28px;font-weight:bold;text-align:center;margin:16px 0 6px;text-shadow:0 2px 8px rgba(0,0,0,0.3)}
.subtitle{font-size:14px;text-align:center;opacity:0.85;margin-bottom:6px}
.db-status{font-size:12px;text-align:center;opacity:0.7;margin-bottom:20px;padding:6px 16px;border-radius:20px;background:rgba(255,255,255,0.15)}
.db-status.ok{background:rgba(72,187,120,0.3)}
.db-status.err{background:rgba(252,129,129,0.3);opacity:1}
.cards{width:100%;max-width:400px;display:flex;flex-direction:column;gap:14px}
.card{background:rgba(255,255,255,0.18);border-radius:18px;padding:20px 18px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.25);cursor:pointer;touch-action:manipulation;text-decoration:none;color:#fff;display:flex;align-items:center;gap:14px;transition:transform 0.15s}
.card:active{transform:scale(0.96)}
.card-icon{font-size:36px;flex-shrink:0;width:50px;text-align:center}
.card-info{flex:1}
.card-name{font-size:17px;font-weight:bold;margin-bottom:3px}
.card-desc{font-size:12px;opacity:0.8;line-height:1.4}
.voiceTip{background:rgba(255,243,205,0.95);border:1px solid #ffc107;border-radius:10px;padding:10px 14px;font-size:13px;color:#856404;margin-bottom:14px;width:100%;max-width:400px;display:none;text-align:center}
.brand{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:12px;font-size:12px;font-weight:bold;color:#000;background:rgba(255,255,255,0.9)}
</style>
</head>
<body>
<div class="wrap">
<div class="title">🎧 四年级英语</div>
<div class="subtitle">外研版（新标准三起）· 手机版</div>
<div class="db-status" id="dbStatus">🔄 正在连接数据库...</div>
<div class="voiceTip" id="voiceTip"></div>
<div class="cards">
<a class="card" href="listen4m.html">
<div class="card-icon">👂</div>
<div class="card-info">
<div class="card-name">听录音选句子</div>
<div class="card-desc">听英语发音，选出正确句子</div>
</div>
</a>
<a class="card" href="translate4m.html">
<div class="card-icon">📝</div>
<div class="card-info">
<div class="card-name">中译英小达人</div>
<div class="card-desc">看中文写英文，智能判分</div>
</div>
</a>
<a class="card" href="judge4m.html">
<div class="card-icon">✅</div>
<div class="card-info">
<div class="card-name">句子正误大判断</div>
<div class="card-desc">判断对错，答错自动讲解</div>
</div>
</a>
<a class="card" href="chat4m.html">
<div class="card-icon">💬</div>
<div class="card-info">
<div class="card-name">英语聊天小达人</div>
<div class="card-desc">9个情景对话，学以致用</div>
</div>
</a>
</div>
</div>
<div class="brand">眉山苏启儿 微信同号 19950525152</div>
<script>
var SB_URL='https://iigckwcdwclmekyxsvbj.supabase.co';
var SB_KEY='sb_publishable_AWxSEp2mc9X5FXD9y7sFjA_9GY19yrJ';
var dbEl=document.getElementById('dbStatus');
var x=new XMLHttpRequest();
x.open('GET',SB_URL+'/rest/v1/sentences?select=id&grade=eq.4&limit=1');
x.setRequestHeader('apikey',SB_KEY);
x.setRequestHeader('Authorization','Bearer '+SB_KEY);
x.onload=function(){
  if(x.status===200){
    dbEl.textContent='✅ 数据库已连接';
    dbEl.className='db-status ok';
  }else{
    dbEl.textContent='❌ 数据库连接失败('+x.status+')';
    dbEl.className='db-status err';
  }
};
x.onerror=function(){
  dbEl.textContent='❌ 网络错误，请检查网络';
  dbEl.className='db-status err';
};
x.send();

if('speechSynthesis' in window){
  var checked=false;
  function checkV(){
    if(checked)return;
    var v=window.speechSynthesis.getVoices();
    if(!v.length)return;
    checked=true;
    var en=v.filter(function(x){return x.lang.toLowerCase().indexOf('en')>-1});
    if(!en.length){
      document.getElementById('voiceTip').textContent='⚠️ 未检测到英语语音引擎，音频可能无法播放。建议安装Google TTS';
      document.getElementById('voiceTip').style.display='block';
    }
  }
  checkV();
  window.speechSynthesis.onvoiceschanged=checkV;
  setTimeout(checkV,3000);
}

var h=window.innerHeight;document.documentElement.style.height=h+'px';document.querySelector('.wrap').style.height=h+'px';
var lastH=h;
window.addEventListener('resize',function(){var n=window.innerHeight;if(Math.abs(n-lastH)>100){lastH=n;document.documentElement.style.height=n+'px';document.querySelector('.wrap').style.height=n+'px'}});
</script>
</body>
</html>
