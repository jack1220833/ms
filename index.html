<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>清班学习乐园</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#e0f7fa 0%,#f3e5f5 50%,#fff3e0 100%);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  overflow-y:auto;
}
.container{
  width:100%;
  max-width:500px;
  text-align:center;
}
.header{
  margin-bottom:30px;
}
.header-icon{
  font-size:4em;
  margin-bottom:10px;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.header-title{
  color:#2d3748;
  font-size:2.2em;
  font-weight:900;
  margin-bottom:8px;
  text-shadow:2px 2px 4px rgba(0,0,0,0.1);
}
.header-subtitle{
  color:#6b7280;
  font-size:1em;
  font-weight:400;
  letter-spacing:0.05em;
}
.cards{
  display:flex;
  flex-direction:column;
  gap:20px;
  margin-bottom:30px;
}
.card{
  display:block;
  text-decoration:none;
  border-radius:24px;
  padding:28px 24px;
  box-shadow:0 8px 30px rgba(0,0,0,0.12);
  transition:all 0.3s ease;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.3) 0%,rgba(255,255,255,0) 50%);
  pointer-events:none;
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 12px 40px rgba(0,0,0,0.18);
}
.card:active{
  transform:translateY(-2px) scale(0.98);
}
.card-math{
  background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%);
  border:3px solid rgba(255,255,255,0.5);
}
.card-eng{
  background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);
  border:3px solid rgba(255,255,255,0.5);
}
.card-apple{
  background:linear-gradient(135deg,#f7971e 0%,#ffd200 100%);
  border:3px solid rgba(255,255,255,0.5);
}
.card-icon{
  font-size:3.5em;
  margin-bottom:12px;
}
.card-title{
  color:#fff;
  font-size:1.8em;
  font-weight:900;
  margin-bottom:6px;
  text-shadow:1px 1px 3px rgba(0,0,0,0.2);
}
.card-desc{
  color:rgba(255,255,255,0.9);
  font-size:1em;
  font-weight:400;
}
.card-arrow{
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  font-size:2em;
  color:rgba(255,255,255,0.7);
}
.footer{
  color:#1a1a1a;
  font-size:1.1em;
  font-weight:bold;
  padding:10px 0;
  line-height:1.6;
}
@media(max-width:480px){
  .header-icon{font-size:3em}
  .header-title{font-size:1.8em}
  .card{padding:24px 20px}
  .card-icon{font-size:3em}
  .card-title{font-size:1.5em}
  .card-arrow{font-size:1.5em}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-icon">🎮</div>
    <h1 class="header-title">清班学习乐园</h1>
    <p class="header-subtitle">快乐学习 · 趣味闯关</p>
  </div>
  
  <div class="cards">
    <a href="math.html" class="card card-math">
      <div class="card-icon">📐</div>
      <div class="card-title">数学大冒险</div>
      <div class="card-desc">30道母题闯关 · 趣味数学挑战</div>
      <div class="card-arrow">→</div>
    </a>
    
    <a href="eng.html" class="card card-eng">
      <div class="card-icon">🎧</div>
      <div class="card-title">英语听力</div>
      <div class="card-desc">听录音选句子 · 英语听力练习</div>
      <div class="card-arrow">→</div>
    </a>
    
    <a href="apple.html" class="card card-apple">
      <div class="card-icon">🍎</div>
      <div class="card-title">苹果机</div>
      <div class="card-desc">经典水果机 · 轻松娱乐一下</div>
      <div class="card-arrow">→</div>
    </a>
  </div>
  
  <div class="footer">
    清班数学组小同学们研制<br>
    制作：虹虹姐，刚子，Tony，雨香屁
  </div>
</div>
</body>
</html>
