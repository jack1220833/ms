<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>听录音选句子 - 英语听力练习</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{height:100%}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;background:linear-gradient(180deg,#f0f4ff 0%,#e8f5e9 50%,#fff3e0 100%);display:flex;justify-content:center;align-items:center;padding:16px}
.main{background:#fff;border-radius:28px;padding:32px 24px;max-width:400px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.12);text-align:center}
h1{font-size:26px;color:#333;margin-bottom:6px}
.sub{font-size:14px;color:#888;margin-bottom:24px}
.btn{display:block;width:100%;padding:22px 20px;border:none;border-radius:18px;font-size:22px;font-weight:700;cursor:pointer;text-decoration:none;margin:14px 0;touch-action:manipulation;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(.96);opacity:.88}
.btn-g3{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#fff;box-shadow:0 6px 24px rgba(67,233,123,.4)}
.btn-g4{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;box-shadow:0 6px 24px rgba(79,172,254,.4)}
.btn-g5{background:linear-gradient(135deg,#f7971e,#ffd200);color:#fff;box-shadow:0 6px 24px rgba(247,151,30,.4)}
.btn-g6{background:linear-gradient(135deg,#9C27B0,#E91E63);color:#fff;box-shadow:0 6px 24px rgba(156,39,176,.4)}
.grade-label{font-size:28px;font-weight:800;display:block;margin-bottom:2px}
.grade-sub{font-size:13px;font-weight:400;opacity:.9}
.hint{font-size:11px;color:#aaa;margin-top:20px}
.brand{margin-top:24px;padding-top:18px;border-top:1px solid #eee;font-size:15px;color:#333;font-weight:600;line-height:1.6}
</style>
</head>
<body>
<div class="main">
  <h1>🎧 听录音选句子</h1>
  <p class="sub">小学英语听力练习</p>
  
  <a href="3.html" class="btn btn-g3">
    <span class="grade-label">三年级</span>
    <span class="grade-sub">绿色主题</span>
  </a>
  
  <a href="4.html" class="btn btn-g4">
    <span class="grade-label">四年级</span>
    <span class="grade-sub">蓝色主题</span>
  </a>
  
  <a href="5.html" class="btn btn-g5">
    <span class="grade-label">五年级</span>
    <span class="grade-sub">橙色主题</span>
  </a>
  
  <a href="6.html" class="btn btn-g6">
    <span class="grade-label">六年级</span>
    <span class="grade-sub">紫色主题</span>
  </a>
  
  <p class="hint">🔊 建议使用Chrome浏览器以获得最佳英语发音</p>
  
  <div class="brand">
    清班数学组小同学们研制<br>
    制作：虹虹姐，刚子，Tony，雨香屁
  </div>
</div>
</body>
</html>
