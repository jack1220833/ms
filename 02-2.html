<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>再想想看</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#eef2ff 0%,#fdf2f8 50%,#fff7ed 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;overflow-y:auto}
.container{width:90%;max-width:550px;text-align:center}
.emoji{font-size:4em;margin-bottom:30px;animation:bounce 1.5s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.message{color:#d97706;font-size:1.5em;font-weight:700;line-height:1.8;margin-bottom:50px}
.hint{color:#6b7280;font-size:1em;margin-bottom:40px}
.link-btn{display:inline-block;color:#7c3aed;font-size:1.15em;font-weight:700;text-decoration:none;padding:16px 36px;border:2px solid rgba(124,58,237,0.3);border-radius:50px;background:rgba(124,58,237,0.06);transition:all 0.3s;letter-spacing:0.05em}
.link-btn:hover{background:rgba(124,58,237,0.12);border-color:#7c3aed;transform:translateY(-3px);box-shadow:0 6px 20px rgba(124,58,237,0.15)}
.footer{color:#1a1a1a;font-size:1.1em;font-weight:bold;margin-top:50px;padding:8px 0}
@media(max-width:480px){.message{font-size:1.3em}.hint{font-size:0.9em}.link-btn{font-size:1em;padding:14px 28px}}
</style>
</head>
<body>
<div class="container">
<div class="emoji">🤔</div>
<div class="message">你的回答很有意思<br>别着急，我们一起看看</div>
<div class="hint">归总问题的关键是什么？</div>
<a class="link-btn" href="02-4.html">去看天才的思路</a>
<div class="footer">清班数学组小同学们研制 制作：虹虹姐，刚子，Tony，雨香屁</div>
</div>
<script>
try{
var ctx=new(window.AudioContext||window.webkitAudioContext)();
var now=ctx.currentTime;
[329.63,261.63].forEach(function(freq,i){
var osc=ctx.createOscillator();var gain=ctx.createGain();
osc.type='sine';osc.frequency.setValueAtTime(freq,now+i*0.18);
gain.gain.setValueAtTime(0,now+i*0.18);
gain.gain.linearRampToValueAtTime(0.18,now+i*0.18+0.03);
gain.gain.exponentialRampToValueAtTime(0.001,now+i*0.18+0.4);
osc.connect(gain);gain.connect(ctx.destination);
osc.start(now+i*0.18);osc.stop(now+i*0.18+0.45)
})
}catch(e){}
</script>
</body>
