<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学大冒险</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#eef2ff 0%,#fdf2f8 50%,#fff7ed 100%);min-height:100vh;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;overflow-y:auto;padding:30px 16px}
.container{width:100%;max-width:460px;text-align:center}
.icon-area{font-size:3.5em;margin-bottom:10px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.title{color:#2d3748;font-size:2em;font-weight:900;margin-bottom:6px}
.subtitle{color:#6b7280;font-size:0.95em;font-weight:400;margin-bottom:20px;letter-spacing:0.05em}
.stats-bar{background:rgba(255,255,255,0.9);border:1px solid rgba(0,0,0,0.08);border-radius:10px;padding:8px 16px;margin-bottom:16px;font-size:0.8em;color:#4a5568;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:none}
.stats-bar span{font-weight:700}
.stats-bar .s-correct{color:#059669}
.stats-bar .s-total{color:#2563eb}
.stats-bar .s-rate{color:#d97706}
.clear-btn{display:inline-block;margin-top:8px;padding:4px 14px;border:1px solid rgba(220,38,38,0.3);border-radius:8px;background:rgba(254,226,226,0.5);color:#dc2626;font-size:0.75em;cursor:pointer;font-family:inherit}
.clear-btn:hover{background:rgba(254,202,202,0.6)}
.login-section{margin-bottom:24px;padding:20px;background:rgba(255,255,255,0.95);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.login-title{color:#2d3748;font-size:1.1em;font-weight:700;margin-bottom:16px}
.login-hint{color:#6b7280;font-size:0.85em;margin-bottom:12px}
.login-input{width:100%;max-width:280px;padding:12px 16px;border:2px solid rgba(0,0,0,0.1);border-radius:12px;font-size:1.1em;text-align:center;margin:0 auto 12px;background:#fff;color:#2d3748;font-family:inherit}
.login-input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.login-btn{display:inline-block;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;font-size:1em;font-weight:700;padding:12px 32px;border-radius:30px;cursor:pointer;border:none;box-shadow:0 4px 15px rgba(59,130,246,0.3);transition:all 0.3s}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(59,130,246,0.4)}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.user-info{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
.user-name{color:#059669;font-size:1.1em;font-weight:700}
.logout-btn{color:#dc2626;font-size:0.85em;cursor:pointer;text-decoration:underline}
.login-area{display:none}
.main-area{display:none}
.name-section{margin-bottom:24px}
.name-label{display:block;color:#4a5568;font-size:0.95em;margin-bottom:8px;font-weight:400}
.name-input{width:100%;max-width:300px;padding:12px 16px;border:2px solid rgba(0,0,0,0.1);border-radius:12px;font-size:1.1em;text-align:center;margin:0 auto;background:rgba(255,255,255,0.95);color:#2d3748;font-family:inherit}
.name-input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.grade-section{margin-bottom:30px}
.grade-title{color:#4a5568;font-size:1.1em;margin-bottom:20px;font-weight:400}
.grade-buttons{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:360px;margin:0 auto}
.grade-btn{padding:18px 20px;border:2px solid rgba(0,0,0,0.1);border-radius:16px;background:rgba(255,255,255,0.95);cursor:pointer;transition:all 0.3s;color:#2d3748;font-size:1.15em;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.grade-btn:hover{transform:translateY(-4px);border-color:#3b82f6;background:rgba(59,130,246,0.08);box-shadow:0 8px 25px rgba(59,130,246,0.15)}
.grade-btn span{display:block;font-size:0.7em;color:#9ca3af;margin-top:4px;font-weight:400}
.footer{color:#1a1a1a;font-size:1.1em;font-weight:bold;margin-top:20px;padding:4px 0}
.loading{color:#6b7280;font-size:0.9em}
@media(max-width:480px){.title{font-size:1.7em}.icon-area{font-size:3em}.name-input,.login-input{font-size:1em}.grade-btn{padding:14px 16px;font-size:1em}}
</style>
</head>
<body>
<div class="container">
<div class="icon-area">🎮</div>
<h1 class="title">数学大冒险</h1>
<div class="subtitle">数学挑战 · 快乐学习</div>
<div class="stats-bar" id="statsBar"></div>
<div id="clearArea" style="display:none"><button class="clear-btn" onclick="clearAllData()">清除记录</button></div>

<!-- 登录区域 -->
<div class="login-section" id="loginSection">
<div class="login-title" id="loginTitle">请输入你的名字开始</div>
<div class="login-hint" id="loginHint">第一次输入就是注册，之后直接登录</div>
<div id="loginArea">
<input type="text" id="nameInput" class="login-input" placeholder="输入你的名字" maxlength="10">
<button class="login-btn" id="loginBtn" onclick="handleLogin()">开始学习</button>
<div class="loading" id="loginLoading" style="display:none;margin-top:10px">正在连接服务器...</div>
</div>
<div class="user-info" id="userInfo" style="display:none">
<span class="user-name" id="displayName"></span>
<span class="logout-btn" onclick="logout()">[切换账号]</span>
</div>
</div>

<!-- 主区域（选年级） -->
<div class="main-area" id="mainArea">
<div class="name-section">
<label class="name-label" id="welcomeLabel">你的名字</label>
<input type="text" id="nameInput2" class="name-input" placeholder="输入你的名字" maxlength="10">
</div>
<div class="grade-section">
<div class="grade-title">选择年级开始闯关</div>
<div class="grade-buttons">
<button class="grade-btn" onclick="startGame(3)">三年级<span>整数</span></button>
<button class="grade-btn" onclick="startGame(4)">四年级<span>一位小数</span></button>
<button class="grade-btn" onclick="startGame(5)">五年级<span>两位小数</span></button>
<button class="grade-btn" onclick="startGame(6)">六年级<span>大数挑战</span></button>
</div>
</div>
</div>

<div class="footer">清班数学组小同学们研制 制作：虹虹姐，刚子，Tony，雨香屁</div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// Supabase 配置
const SUPABASE_URL = 'https://iigckwcdwclmekyxsvbj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AWxSEp2mc9X5FXD9y7sFjA_9GY19yrJ';
var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var ls={
get:function(k){try{return localStorage.getItem(k)}catch(e){return null}},
set:function(k,v){try{localStorage.setItem(k,v)}catch(e){}},
remove:function(k){try{localStorage.removeItem(k)}catch(e){}}
};

// 初始化检查登录状态
async function init(){
var savedName=ls.get('playerName');
if(savedName){
document.getElementById('nameInput').value=savedName;
}
checkSession();
}

// 检查sessionStorage中的登录状态
function checkSession(){
var playerId=sessionStorage.getItem('player_id');
var username=sessionStorage.getItem('username');
if(playerId && username){
showUserLoggedIn(username);
}else{
showLoginForm();
}
updateLocalStats();
}

// 显示已登录状态
function showUserLoggedIn(username){
document.getElementById('loginArea').style.display='none';
document.getElementById('userInfo').style.display='flex';
document.getElementById('displayName').textContent=username+' 👤';
document.getElementById('mainArea').style.display='block';
document.getElementById('nameInput2').value=username;
document.getElementById('loginTitle').textContent='欢迎回来！';
document.getElementById('loginHint').textContent='选择年级开始闯关吧';
}

// 显示登录表单
function showLoginForm(){
document.getElementById('loginArea').style.display='block';
document.getElementById('userInfo').style.display='none';
document.getElementById('mainArea').style.display='none';
document.getElementById('loginTitle').textContent='请输入你的名字开始';
document.getElementById('loginHint').textContent='第一次输入就是注册，之后直接登录';
}

// 登录/注册处理
async function handleLogin(){
var name=document.getElementById('nameInput').value.trim();
if(!name){
alert('请输入名字');
return;
}
var btn=document.getElementById('loginBtn');
var loading=document.getElementById('loginLoading');
btn.disabled=true;
loading.style.display='block';

try{
// 先检查是否已存在该用户
var {data:existingUser, error:searchError}=await db.from('players').select('*').eq('username',name).single();

if(searchError && searchError.code!=='PGRST116'){
console.error('查询用户失败:',searchError);
}

if(existingUser){
// 用户已存在，登录
sessionStorage.setItem('player_id',existingUser.id);
sessionStorage.setItem('username',existingUser.username);
showUserLoggedIn(existingUser.username);
}else{
// 新用户，注册
var {data:newPlayer, error:insertError}=await db.from('players').insert({
username:name,
created_at:new Date().toISOString()
}).select().single();

if(insertError){
console.error('注册失败:',insertError);
alert('注册失败，请重试');
btn.disabled=false;
loading.style.display='none';
return;
}

// 创建排行榜记录
await db.from('leaderboard').insert({
player_id:newPlayer.id,
total_correct:0,
total_wrong:0,
last_active:new Date().toISOString()
});

sessionStorage.setItem('player_id',newPlayer.id);
sessionStorage.setItem('username',newPlayer.username);
showUserLoggedIn(newPlayer.username);
}

// 保存本地
ls.set('playerName',name);
}catch(e){
console.error('登录异常:',e);
alert('连接服务器失败，请检查网络后重试');
}finally{
btn.disabled=false;
loading.style.display='none';
}
}

// 登出
function logout(){
sessionStorage.removeItem('player_id');
sessionStorage.removeItem('username');
showLoginForm();
}

// 更新本地统计显示
function updateLocalStats(){
try{
var correct=parseInt(ls.get('unitGame_correct')||'0');
var wrong=parseInt(ls.get('unitGame_wrong')||'0');
var total=correct+wrong;
var rate=total>0?Math.round(correct/total*100):0;
var el=document.getElementById('statsBar');
if(el&&total>0){
el.innerHTML='累计做题 <span class="s-total">'+total+'</span> 题 · 答对 <span class="s-correct">'+correct+'</span> 题 · 正确率 <span class="s-rate">'+rate+'%</span>';
el.style.display='block';
document.getElementById('clearArea').style.display='block';
}
}catch(e){}
}

function clearAllData(){
if(!confirm('确定清除所有做题记录？名字和成绩都会清空。'))return;
var keys=Object.keys(localStorage);
for(var i=0;i<keys.length;i++){
if(keys[i].indexOf('unitGame')===0||keys[i]==='playerName'){ls.remove(keys[i])}
}
location.reload();
}

function startGame(g){
var playerId=sessionStorage.getItem('player_id');
var name=document.getElementById('nameInput2').value.trim()||ls.get('playerName')||'小朋友';
ls.set('playerName',name);
ls.set('unitGame_grade',g);

// 测试阶段只有2个模块，随机选01或02
var games=['01','02'];
var pick=games[Math.floor(Math.random()*games.length)];
window.location.href=pick+'.html?auto=1';
}

// 页面加载时初始化
init();
</script>
</body>
</html>
